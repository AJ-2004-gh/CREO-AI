version: 1
applications:
  - appRoot: creo-ai
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Manually clear the Next.js cache to fix the internal_server_error
            - rm -rf .next/cache
            - npm run build:webpack
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          # We remove .next/cache from here to ensure every build is fresh
    environment:
      variables:
        # Disable Turbopack to use webpack for better AWS SDK compatibility
        TURBOPACK: '0'
        # These will be populated from Amplify Console Environment Variables
        COGNITO_DOMAIN: $COGNITO_DOMAIN
        COGNITO_CLIENT_ID: $COGNITO_CLIENT_ID
        COGNITO_CLIENT_SECRET: $COGNITO_CLIENT_SECRET
        COGNITO_USER_POOL_ID: $COGNITO_USER_POOL_ID
        NEXT_PUBLIC_BASE_URL: $NEXT_PUBLIC_BASE_URL
        NEXT_PUBLIC_COGNITO_DOMAIN: $NEXT_PUBLIC_COGNITO_DOMAIN
        NEXT_PUBLIC_COGNITO_CLIENT_ID: $NEXT_PUBLIC_COGNITO_CLIENT_ID
        CREO_AWS_REGION: $CREO_AWS_REGION
        CREO_AWS_ACCESS_KEY_ID: $CREO_AWS_ACCESS_KEY_ID
        CREO_AWS_SECRET_ACCESS_KEY: $CREO_AWS_SECRET_ACCESS_KEY
        POSTS_TABLE: $POSTS_TABLE
        OPTIMIZATIONS_TABLE: $OPTIMIZATIONS_TABLE
        BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID
        IMAGE_MODEL_ID: $IMAGE_MODEL_ID
        VISION_MODEL_PRIORITY: $VISION_MODEL_PRIORITY
        S3_BUCKET_NAME: $S3_BUCKET_NAME
