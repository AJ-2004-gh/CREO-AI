<!DOCTYPE html>
<html>
<head>
    <title>Test Vision API</title>
</head>
<body>
    <h1>Test Vision API</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="testVision()">Test Vision Generate</button>
    <pre id="output"></pre>

    <script>
        async function testVision() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) {
                alert('Please select an image');
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                
                const token = localStorage.getItem('creo_token');
                if (!token) {
                    alert('Please login first');
                    return;
                }

                try {
                    const response = await fetch('/api/vision-generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            image_base64: base64,
                            platform: 'Instagram',
                            target_language: 'English',
                            cultural_context: 'None'
                        })
                    });

                    const contentType = response.headers.get('content-type');
                    console.log('Response status:', response.status);
                    console.log('Content-Type:', contentType);

                    if (contentType && contentType.includes('application/json')) {
                        const data = await response.json();
                        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
                    } else {
                        const text = await response.text();
                        document.getElementById('output').textContent = 'Non-JSON response:\n' + text;
                    }
                } catch (error) {
                    document.getElementById('output').textContent = 'Error: ' + error.message;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
